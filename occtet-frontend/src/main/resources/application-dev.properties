# NATS CONFIGURATION
nats.url=${NATS_URL:nats://nats:4222}

# DATABASE CONFIGURATION
main.datasource.url=${DB_URL:jdbc:postgresql://db:5432/occtet_boc}
main.datasource.username=${DB_USERNAME:occtetuser}
main.datasource.password=${DB_PASSWORD:vrcn4xerj8u3n587niuhrfwe87zgf345osidhfoiesrf4dtdz3e85u9}
main.datasource.driver-class-name=org.postgresql.Driver
main.datasource.driver=postgresql

# ECLIPSELINK DDL GENERATION
spring.jpa.properties.eclipselink.ddl-generation=create-or-extend-tables
spring.jpa.properties.eclipselink.ddl-generation.output-mode=database

# VAADIN / UI PERFORMANCE
# Simulate production UI optimizations
vaadin.productionMode=true
vaadin.servlet.productionMode=true
vaadin.compatibilityMode=false

# LOGGING
logging.level.eu.occtet.bocfrontend=debug

# AUTHENTICATION
# Enforce Jmix default auth (Disables OIDC)
jmix.oidc.use-default-configuration=false

# EXTERNAL SERVICES
# ORT Server within the docker network
ort.clientId=${ORT_CLIENT_ID:ort-server}
ort.tokenUrl=${ORT_TOKEN_URL:http://keycloak:8081/realms/master/protocol/openid-connect/token}
ort.baseURL=${ORT_BASE_URL:http://ort-server:8080}
ort.username=${ORT_USERNAME:ort-admin}
ort.password=${ORT_PASSWORD:password}