# VAADIN / UI PERFORMANCE (LIVE)
vaadin.productionMode=true
vaadin.servlet.productionMode=true
vaadin.compatibilityMode=false

# LOGGING
logging.level.eu.occtet.bocfrontend=INFO
logging.level.org.springframework.security=WARN

# SERVER CONFIGURATION
server.port=${SERVER_PORT:8090}

# NATS
nats.stream-name=occtet
nats.url=${NATS_URL:nats://nats:4222}

# DATABASE
main.datasource.url=${DB_URL}
main.datasource.username=${DB_USERNAME}
main.datasource.password=${DB_PASSWORD}
main.datasource.driver-class-name=org.postgresql.Driver

# ECLIPSELINK DDL GENERATION (DISABLED FOR SAFETY)
# Crucial: Never auto-generate or alter tables in live! Rely entirely on Liquibase.
# uncomment if the case
#spring.jpa.properties.eclipselink.ddl-generation=none

# EXTERNAL SERVICES (ORT Server)
ort.clientId=${ORT_CLIENT_ID:ort-server}
ort.tokenUrl=${ORT_TOKEN_URL}
ort.baseURL=${ORT_BASE_URL}
ort.username=${ORT_USERNAME}
ort.password=${ORT_PASSWORD}

# disable JMIX OIDC (use oidc profile if you want to use this)
jmix.oidc.use-default-configuration=false
#jmix.oidc.enabled=false

#Certificates: has to be the absolute path
https.cacert.path=${HTTPS_CA_CERT_PATH}