# JMIX oidc
jmix.oidc.use-default-configuration=true
jmix.oidc.enabled=true
jmix.oidc.default-provider=keycloak

# Keycloak - Client Configuration
spring.security.oauth2.client.provider.keycloak.issuer-uri=https://<YOUR_KEYCLOAK_BASE_URL>/realms/<YOUR_KEYCLOAK_REALM>
spring.security.oauth2.resourceserver.jwt.issuer-uri=${spring.security.oauth2.client.provider.keycloak.issuer-uri}

# The Client ID. Based on ORT docs: 'ort-server-ui'
spring.security.oauth2.client.registration.keycloak.client-id=<YOUR_UI_CLIENT_ID>

# Based on the ORT docs client auth is disabled, if this is no longer the case uncomment this line
#spring.security.oauth2.client.registration.keycloak.client-secret=<LIVE_CLIENT_SECRET>

spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email,ort-server-api-access

# Keycloak - Protecting API
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code

# The live domain redirect URI.
spring.security.oauth2.client.registration.keycloak.redirect-uri=https://<BOC_FRONTEND_DOMAIN>/login/oauth2/code/keycloak

# Optional Settings
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
jmix.oidc.default-claims-roles-mapper.roles-claim-name=roles
