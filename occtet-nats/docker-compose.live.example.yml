#version: '0.3.8'

# ENVIRONMENT ANCHOR (DRY Configuration)
x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: live
  DB_URL: jdbc:postgresql://db:5432/occtet_boc
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  NATS_URL: nats://nats:4222

services:
  db:
    image: pgvector/pgvector:pg17-trixie
    command: -c 'max_connections=200'
    container_name: db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=occtet_boc
      - PGDATA=/data/postgresql
    volumes:
      - db_data:/data/postgresql
      - ./init-postgresql-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mynet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d occtet_boc" ]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:latest
    container_name: nats
    restart: always
    volumes:
      - nats_data:/data/jetstream
      - ./nats.conf:/etc/nats/nats.conf
    command: [ "-c", "/etc/nats/nats.conf" ]
    networks:
      - mynet

  frontend:
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    image: occtet-boc-frontend:0.3.10-SNAPSHOT
    ports:
      - "8090:8090"
    volumes:
      - /home/occtet/project_data:/project_data
    networks:
      - mynet
    environment:
      <<: *common-env
      ORT_TOKEN_URL: ${ORT_TOKEN_URL}
      ORT_BASE_URL: ${ORT_BASE_URL}
      ORT_USERNAME: ${ORT_USERNAME}
      ORT_PASSWORD: ${ORT_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
  # ONLY UNCOMMENT if Keycloak client authentication is set to "Enabled"
#      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mynet

  licensematcher-service:
    image: occtet-nats-licensematcher-service:0.3.8-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env

  copyrightfilter-service:
    image: occtet-nats-copyrightfilter-service:0.3.8-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env

  vulnerability-service:
    image: occtet-nats-vulnerability-service:0.3.8-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env

  spdx-service:
    image: occtet-nats-spdx-service:0.3.10-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env

  spdx-export-service:
    image: occtet-nats-spdx-export-service:0.3.10-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env

  download-service:
    image: occtet-nats-download-service:0.3.9-SNAPSHOT
    depends_on: [frontend, db, nats]
    volumes:
      - /home/occtet/project_data:/project_data
    networks: [mynet]
    environment:
      <<: *common-env

  # AI MICROSERVICES
  ai-copyrightfilter-service:
    image: occtet-nats-ai-copyrightfilter-service:0.3.8-SNAPSHOT
    depends_on: [frontend, ollama, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

  ai-licensematcher-service:
    image: occtet-nats-ai-licensematcher-service:0.3.8-SNAPSHOT
    depends_on: [ollama, frontend, nats]
    networks: [mynet]
    environment:
      <<: *common-env
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

  # ORT MICROSERVICES
  ort-run-start-service:
    image: occtet-nats-ort-run-start-service:0.3.8-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env
      ORT_TOKEN_URL: ${ORT_TOKEN_URL}
      ORT_BASE_URL: ${ORT_BASE_URL}
      ORT_USERNAME: ${ORT_USERNAME}
      ORT_PASSWORD: ${ORT_PASSWORD}

  process-run-service:
    image: occtet-nats-process-run-service:0.3.8-SNAPSHOT
    depends_on: [frontend, db, nats]
    networks: [mynet]
    environment:
      <<: *common-env
      ORT_TOKEN_URL: ${ORT_TOKEN_URL}
      ORT_BASE_URL: ${ORT_BASE_URL}
      ORT_USERNAME: ${ORT_USERNAME}
      ORT_PASSWORD: ${ORT_PASSWORD}

# VOLUMES & NETWORKS (Root Level)
volumes:
  db_data:
    external: true
  nats_data:
    external: true
  ollama_data:
    external: true

networks:
  mynet:
    driver: bridge