# SPRING BOOT CORE
spring.profiles.active=@spring.profiles.active@
spring.main.web-application-type=none
spring.thymeleaf.cache=false
spring.main.show-banner=false
spring.main.allow-bean-definition-overriding=true
spring.profiles.validate=false
server.servlet.session.timeout=120s
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=3s
application.version=@project.version@

# JPA CONFIGURATION
spring.jpa.properties.javax.persistence.provider=org.eclipse.persistence.jpa.PersistenceProvider

# NATS JETSTREAM MICROSERVICE CONFIGURATION
nats.stream-name=${NATS_STREAM_NAME:occtet}
nats.work-subject=work.ortProcessRun
nats.send-subject=work.spdx

# LOGGING DEFAULTS
logging.level.eu.occtet=debug
logging.level.eu.occtet.testloglevel=debug


